<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Issue Uploader{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@2.0.7"></script>
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="{% url 'home' %}">Issue Uploader</a>
      <div class="d-flex gap-2 ms-auto">
        <a class="btn btn-sm btn-outline-secondary" href="{% url 'agent-configs' %}">Agent configs</a>
        <a class="btn btn-sm btn-outline-secondary" href="{% url 'repositories' %}">Repositories</a>
        <a class="btn btn-sm btn-outline-secondary" href="{% url 'scan-tasks' %}">Scan tasks</a>
        <a class="btn btn-sm btn-outline-secondary" href="{% url 'issue-candidates' %}">Candidates</a>
      </div>
    </div>
  </nav>
  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>
</body>
</html>

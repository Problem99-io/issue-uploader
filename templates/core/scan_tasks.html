{% extends "base.html" %}

{% block title %}Scan Tasks{% endblock %}

{% block content %}
<div class="row g-4">
  <div class="col-12 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">Create scan task</h1>
        <form method="post" class="vstack gap-3">
          {% csrf_token %}
          {{ form.as_div }}
          <button type="submit" class="btn btn-primary" name="action" value="create-task">Create task</button>
        </form>
      </div>
    </div>
  </div>
  <div class="col-12 col-lg-7">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-center mb-3 gap-2 flex-wrap">
          <h2 class="h5 mb-0">Scan task history</h2>
          <form method="post" class="m-0">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-secondary btn-sm" name="action" value="rerun-all">Rerun all tasks</button>
          </form>
        </div>
        <div
          id="scan-task-table"
          hx-get="table/"
          hx-trigger="load, every 3s"
          hx-swap="innerHTML"
        >
          {% include "core/partials/scan_task_table.html" %}
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block title %}Task Manager{% endblock %}

{% block content %}
<div class="card shadow-sm">
  <div class="card-body p-4">
    <div class="d-flex justify-content-between align-items-center gap-2 flex-wrap mb-3">
      <h1 class="h4 mb-0">Task Manager</h1>
      <form method="post" class="m-0">
        {% csrf_token %}
        <button type="submit" class="btn btn-outline-secondary btn-sm" name="action" value="rerun-all">Rerun all</button>
      </form>
    </div>

    <div
      id="task-manager-table"
      data-live-url="{% url 'task-manager-table' %}"
    >
      {% include "core/partials/task_manager_table.html" %}
    </div>
  </div>
</div>

<script>
  (() => {
    const tableEl = document.getElementById('task-manager-table');
    if (!tableEl) return;

    const url = tableEl.getAttribute('data-live-url');
    if (!url) return;
    let inFlight = false;

    const refresh = async () => {
      if (inFlight) return;
      inFlight = true;
      try {
        const response = await fetch(url, { headers: { 'HX-Request': 'true' } });
        if (!response.ok) return;
        const html = await response.text();
        const trimmed = html.trim().toLowerCase();
        const isExpectedFragment = trimmed.includes('<table') || trimmed.includes('no tasks available');
        if (!isExpectedFragment) return;
        tableEl.innerHTML = html;
      } catch (_) {
      } finally {
        inFlight = false;
      }
    };

    setInterval(refresh, 2000);
  })();
</script>
{% endblock %}

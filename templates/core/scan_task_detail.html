{% extends "base.html" %}

{% block title %}Scan Task {{ scan_task.id }}{% endblock %}

{% block content %}
<div
  id="scan-task-live"
  hx-get="live/"
  hx-trigger="load, every 5s"
  hx-swap="innerHTML"
>
  {% include "core/partials/scan_task_live.html" %}
</div>

<script>
  // Auto-scroll the debug console to top (newest entries) on each HTMX swap
  document.body.addEventListener('htmx:afterSwap', function(evt) {
    var console = document.getElementById('step-log-console');
    if (console) {
      console.scrollTop = 0;
    }
  });
</script>
{% endblock %}
